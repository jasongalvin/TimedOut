<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Blocked — TimedOut</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f13;
      color: #e4e4e7;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 480px;
      padding: 2rem;
    }

    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 1.5rem;
      color: #6366f1;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .domain-name {
      color: #a5b4fc;
      font-size: 1.125rem;
      font-weight: 500;
      margin-bottom: 2rem;
    }

    .label {
      font-size: 0.875rem;
      color: #71717a;
      margin-bottom: 0.75rem;
    }

    .presets {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .preset-btn {
      background: #1e1e2a;
      color: #e4e4e7;
      border: 1px solid #2e2e3a;
      border-radius: 8px;
      padding: 0.625rem 1.25rem;
      font-size: 0.9375rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .preset-btn:hover {
      background: #6366f1;
      border-color: #6366f1;
      color: #fff;
    }

    .status {
      font-size: 0.875rem;
      color: #71717a;
      min-height: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Timer/clock icon (Lucide-style) -->
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="13" r="8"/>
      <path d="M12 9v4l2 2"/>
      <path d="M5 3 2 6"/>
      <path d="m22 6-3-3"/>
      <path d="M6.38 18.7 4 21"/>
      <path d="M17.64 18.67 20 21"/>
    </svg>
    <h1>This site is blocked</h1>
    <p class="domain-name" id="domain"></p>
    <p class="label">Unlock temporarily:</p>
    <div class="presets" id="presets"></div>
    <p class="status" id="status"></p>
  </div>
  <script type="module" src="blocked.js"></script>
</body>
</html>
