<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimedOut</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      background: #0f0f13;
      color: #e4e4e7;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 0.8125rem;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #1e1e2a;
    }

    .header svg {
      width: 20px;
      height: 20px;
      color: #6366f1;
    }

    .header h1 {
      font-size: 0.9375rem;
      font-weight: 600;
    }

    section {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #1e1e2a;
    }

    section:last-child {
      border-bottom: none;
    }

    .section-title {
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #71717a;
      margin-bottom: 0.5rem;
    }

    /* Add domain input */
    .add-row {
      display: flex;
      gap: 0.375rem;
    }

    .add-row input {
      flex: 1;
      background: #1e1e2a;
      border: 1px solid #2e2e3a;
      border-radius: 6px;
      padding: 0.375rem 0.5rem;
      color: #e4e4e7;
      font-size: 0.8125rem;
      outline: none;
    }

    .add-row input::placeholder { color: #52525b; }
    .add-row input:focus { border-color: #6366f1; }

    .add-row button {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.375rem 0.75rem;
      font-size: 0.8125rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .add-row button:hover { background: #4f46e5; }

    /* List items */
    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.375rem 0;
    }

    .domain-label {
      font-size: 0.8125rem;
      word-break: break-all;
    }

    .remove-btn {
      background: none;
      border: none;
      color: #ef4444;
      font-size: 0.75rem;
      cursor: pointer;
      padding: 0.125rem 0.375rem;
      border-radius: 4px;
    }

    .remove-btn:hover { background: rgba(239, 68, 68, 0.15); }

    .timer-remaining {
      color: #a5b4fc;
      font-variant-numeric: tabular-nums;
      font-size: 0.8125rem;
    }

    .empty {
      color: #52525b;
      font-style: italic;
      font-size: 0.75rem;
    }

    /* Settings */
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .setting-row select {
      background: #1e1e2a;
      border: 1px solid #2e2e3a;
      border-radius: 6px;
      padding: 0.25rem 0.5rem;
      color: #e4e4e7;
      font-size: 0.8125rem;
      outline: none;
    }

    .setting-row select:focus { border-color: #6366f1; }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="13" r="8"/>
      <path d="M12 9v4l2 2"/>
      <path d="M5 3 2 6"/>
      <path d="m22 6-3-3"/>
      <path d="M6.38 18.7 4 21"/>
      <path d="M17.64 18.67 20 21"/>
    </svg>
    <h1>TimedOut</h1>
  </div>

  <section>
    <p class="section-title">Block a site</p>
    <div class="add-row">
      <input type="text" id="domain-input" placeholder="e.g. reddit.com">
      <button id="add-btn">Add</button>
    </div>
  </section>

  <section>
    <p class="section-title">Blocked sites</p>
    <div id="blacklist"></div>
  </section>

  <section>
    <p class="section-title">Active timers</p>
    <div id="timers"></div>
  </section>

  <section>
    <p class="section-title">Settings</p>
    <div class="setting-row">
      <span>Default unlock duration</span>
      <select id="default-duration"></select>
    </div>
  </section>

  <script type="module" src="popup.js"></script>
</body>
</html>
